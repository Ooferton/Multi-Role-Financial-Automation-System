brokerage:
  api_key_env_var: APCA_API_KEY_ID
  api_secret_env_var: APCA_API_SECRET_KEY
  base_url: https://paper-api.alpaca.markets
  name: ALPACA
  paper_trading: true
data:
  feature_store_path: data/feature_store
  history_storage: data/history.db
  macro_update_mins: 15
  news_cache_mins: 30
  provider: MOCK
orchestrator:
  allocation_model: dynamic
  rebalance_frequency: 1h
risk:
  max_daily_loss: 1000.0
  max_drawdown_percent: 0.02
  max_global_drawdown: 0.15
  max_leverage: 1.5
  max_single_position_pct: 0.1
  risk_envelope_active: true
  volatility_limit: 0.08
system:
  crypto_etf_only: true
  log_level: INFO
  mode: PAPER
  timezone: US/Eastern
